name: nous
version: 1.0.0
description: "Dashboard auth provider — OAuth 2.0 (authorization-code + PKCE) against Nous Portal. Auto-activates when a client_id is configured via either dashboard.oauth.client_id in config.yaml (canonical surface) or LITTLE_DASHBOARD_OAUTH_CLIENT_ID env var (operator override; Portal injects this at Fly.io provisioning). dashboard.oauth.portal_url / LITTLE_DASHBOARD_PORTAL_URL are optional and default to https://portal.little-agent.com."
author: little-agent
kind: backend
requires_env:
  - LITTLE_DASHBOARD_OAUTH_CLIENT_ID
