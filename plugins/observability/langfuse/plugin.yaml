name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Little — traces conversations, LLM calls, and tool usage. Opt-in via `little plugins enable observability/langfuse` (or check the box in `little plugins`)."
author: little-agent
requires_env:
  - LITTLE_LANGFUSE_PUBLIC_KEY
  - LITTLE_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
